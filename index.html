<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Game: Mắt Tinh - Óc Sáng</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  /* Chống bôi đen text trên mobile */
  -webkit-user-select: none;
  user-select: none; 
}

.header-text {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffdd59;
    /* Dùng clamp để font chữ tự động to nhỏ theo màn hình */
    font-size: clamp(16px, 4vw, 24px); 
    font-weight: bold;
    z-index: 200;
    text-shadow: 0 0 10px rgba(255, 221, 89, 0.5);
    pointer-events: none;
    width: 90%;
    text-align: center;
}

.stage {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.lane {
  position: absolute;
  width: 100%;
  display: flex;
  align-items: center;
  white-space: nowrap;
  will-change: transform;
}

.keyword {
  display: inline-block;
  color: #fff;
  /* Giãn khoảng cách các từ trên mobile */
  padding: 0 max(15px, 3vw); 
  cursor: crosshair;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  letter-spacing: 1px;
  /* Xóa hiệu ứng bóng mờ khi tap trên điện thoại */
  -webkit-tap-highlight-color: transparent; 
  /* Tăng tốc độ phản hồi khi chạm */
  touch-action: manipulation; 
}

/* Hiệu ứng khi lướt chuột qua (chỉ tác dụng trên máy tính) */
@media (hover: hover) {
  .keyword:hover {
    text-shadow: 0 0 15px rgba(255,255,255,1);
    transform: scale(1.1);
    opacity: 1 !important;
    z-index: 10;
  }
}

/* Hiệu ứng khi bấm ĐÚNG (Từ khóa bài học) */
.keyword.correct {
  color: #0be881 !important; 
  font-weight: 900 !important;
  text-shadow: 0 0 20px #0be881, 0 0 40px #0be881 !important;
  transform: scale(1.3); /* Scale nhẹ lại cho mobile đỡ tràn */
  opacity: 1 !important;
  z-index: 100;
}

/* Hiệu ứng khi bấm SAI (Từ gây nhiễu) */
.keyword.wrong {
  color: #ff3f34 !important; 
  text-decoration: line-through;
  opacity: 0.3 !important;
  transform: scale(0.8);
}

.vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  background:
    linear-gradient(to right, #111 0%, transparent 15%, transparent 85%, #111 100%),
    linear-gradient(to bottom, #111 0%, transparent 10%, transparent 90%, #111 100%);
}
</style>
</head>
<body>

<div class="header-text">NHANH MẮT TÌM TỪ KHÓA BÀI HỌC (Chạm vào chữ)</div>
<div class="vignette"></div>
<div class="stage" id="stage"></div>

<script>
const TARGET_WORDS = [
  "Hoạt động chủ đạo", "Tuổi đầu thanh niên", "Hướng nghiệp", "15–18 tuổi",
  "Xu hướng nghề nghiệp", "Chọn nghề", "Hứng thú nghề", "Khẳng định bản thân",
  "Kỳ vọng cha mẹ", "Hoạt động nhận thức", "Tri giác có chủ định", "Ghi nhớ logic", 
  "Tư duy trừu tượng", "Tư duy lý luận", "Óc phê phán", "Hoài nghi khoa học",
  "Tính độc lập", "Tính sáng tạo", "Cá nhân hóa", "Sở thích cá nhân"
];

const NOISE_WORDS = [
  "Trà sữa trân châu", "Định lý Pi-ta-go", "Chơi Game Online", "Idol Tiktok", 
  "Bún đậu mắm tôm", "Hố đen vũ trụ", "Đu Trend mạng", "Bấm điện thoại", 
  "Cúp C1 Châu Âu", "Ngủ nướng", "Lực ma sát", "Cách mạng 4.0", 
  "Shopping săn sale", "Trí tuệ nhân tạo AI", "Tập Gym", "Phim truyền hình", 
  "Lướt Facebook", "Tóp Tóp", "Gà rán KFC", "Oxi hóa khử", "Đạo hàm tích phân"
];

const ALL_KEYWORDS = TARGET_WORDS.concat(NOISE_WORDS);

const stage = document.getElementById('stage');

// Phát hiện xem có phải màn hình điện thoại không
const isMobile = window.innerWidth < 768;

// Tự động điều chỉnh số dòng: Mobile ít dòng hơn một chút để chữ không dính vào nhau
const LANE_COUNT = isMobile ? 8 : 10; 
const laneHeight = 100 / LANE_COUNT;

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Cấu hình font chữ: Thu nhỏ lại nếu đang ở trên điện thoại
const sizes = isMobile ? [14, 16, 20, 24, 28] : [16, 20, 24, 28, 36, 42];
const weights = [300, 400, 600, 700];     
const opacities = [0.4, 0.6, 0.8, 1.0];   

function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const laneData = [];

for (let i = 0; i < LANE_COUNT; i++) {
  const lane = document.createElement('div');
  lane.className = 'lane';

  const topPct = (i / LANE_COUNT) * 100 + laneHeight * 0.1;
  lane.style.top = topPct + 'vh';
  lane.style.height = laneHeight + 'vh';

  const words = shuffle(ALL_KEYWORDS).concat(shuffle(ALL_KEYWORDS));

  words.forEach(word => {
    const span = document.createElement('span');
    span.className = 'keyword';
    span.textContent = word;

    span.style.fontSize   = randFrom(sizes) + 'px';
    span.style.fontWeight = randFrom(weights);
    span.style.opacity    = randFrom(opacities);

    // Xử lý sự kiện chạm/click
    span.onclick = function() {
      if (this.classList.contains('correct') || this.classList.contains('wrong')) return;

      if (TARGET_WORDS.includes(this.textContent)) {
        this.classList.add('correct'); 
      } else {
        this.classList.add('wrong');   
      }
    };

    lane.appendChild(span);
  });

  stage.appendChild(lane);

  // Điều chỉnh tốc độ: Chạy chậm hơn một chút trên mobile vì màn hình hẹp
  const baseSpeed = isMobile ? 80 : 150;
  const randomSpeed = isMobile ? 60 : 100;
  const speed = baseSpeed + Math.random() * randomSpeed; 
  
  const dir   = (i % 2 === 0) ? 1 : -1;  

  laneData.push({ el: lane, speed, dir, offset: 0 });
}

requestAnimationFrame(() => {
  laneData.forEach(lane => {
    const w = lane.el.scrollWidth;
    lane.totalWidth = w;
    lane.offset = lane.dir === 1 ? -w / 2 : 0;
    lane.el.style.transform = `translateX(${lane.offset}px)`;
  });
});

let last = null;
function animate(ts) {
  if (!last) last = ts;
  const dt = (ts - last) / 1000;
  last = ts;

  laneData.forEach(lane => {
    if (!lane.totalWidth) return;
    const half = lane.totalWidth / 2;

    lane.offset -= lane.dir * lane.speed * dt;

    if (lane.dir === 1 && lane.offset < -half) lane.offset += half;
    if (lane.dir === -1 && lane.offset > 0)    lane.offset -= half;

    lane.el.style.transform = `translateX(${lane.offset}px)`;
  });

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
