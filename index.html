<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Game: Mắt Tinh - Óc Sáng</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;overflow:hidden;background:#0d0d1a;font-family:'Segoe UI',sans-serif;-webkit-user-select:none;user-select:none;touch-action:pan-y}

#header{
  position:absolute;top:0;left:0;right:0;z-index:300;
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(13,13,26,0.95) 70%,transparent);
}
#title{
  color:#f0c040;font-size:clamp(12px,3.5vw,17px);font-weight:700;
  letter-spacing:0.3px;text-shadow:0 0 12px rgba(240,192,64,0.4);
}
#score-panel{display:flex;gap:12px;align-items:center}
.score-box{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:4px 10px;text-align:center;
}
.score-label{font-size:10px;color:rgba(255,255,255,0.45);display:block;line-height:1}
.score-val{font-size:16px;font-weight:700;color:#fff;line-height:1.4}
#score-val{color:#4eff9f}
#miss-val{color:#ff5b5b}

#stage{position:absolute;inset:0;overflow:hidden}

.lane{
  position:absolute;width:100%;display:flex;align-items:center;
  white-space:nowrap;will-change:transform;
}

.kw{
  display:inline-block;color:#e0e0e0;
  padding:0 clamp(12px,2.5vw,22px);
  cursor:pointer;
  transition:color 0.2s,transform 0.2s,opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  border-radius:4px;
}
@media(hover:hover){
  .kw:hover{
    color:#fff;text-shadow:0 0 14px rgba(255,255,255,0.8);
    transform:scale(1.12);z-index:10;position:relative;
  }
}
.kw.hit{
  color:#3dffa0!important;font-weight:800!important;
  text-shadow:0 0 16px #3dffa0,0 0 32px #3dffa070!important;
  transform:scale(1.25)!important;opacity:1!important;
  z-index:50;position:relative;pointer-events:none;
}
.kw.miss{
  color:#ff4444!important;text-decoration:line-through!important;
  opacity:0.25!important;transform:scale(0.82)!important;pointer-events:none;
}

#vignette{
  position:fixed;inset:0;pointer-events:none;z-index:200;
  background:
    linear-gradient(to right,#0d0d1a 0%,transparent 14%,transparent 86%,#0d0d1a 100%),
    linear-gradient(to bottom,#0d0d1a 0%,transparent 14%,transparent 88%,#0d0d1a 100%);
}

#toast{
  position:fixed;top:64px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;z-index:400;
  transition:opacity 0.2s,transform 0.2s;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.good{background:rgba(61,255,160,0.18);border:1px solid #3dffa070;color:#3dffa0}
#toast.bad{background:rgba(255,68,68,0.18);border:1px solid #ff444470;color:#ff6666}
</style>
</head>
<body>

<div id="header">
  <div id="title">NHANH MẮT TÌM TỪ KHÓA BÀI HỌC</div>
  <div id="score-panel">
    <div class="score-box">
      <span class="score-label">ĐÚNG</span>
      <span class="score-val" id="score-val">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">SAI</span>
      <span class="score-val" id="miss-val">0</span>
    </div>
  </div>
</div>

<div id="vignette"></div>
<div id="stage"></div>
<div id="toast"></div>

<script>
const TARGET_WORDS = [
  "Hoạt động chủ đạo","Tuổi đầu thanh niên","Hướng nghiệp","15–18 tuổi","Ước mơ",
  "Trí tuệ cảm xúc","Khả năng giao tiếp","Tư vấn hướng nghiệp","Xu hướng nghề nghiệp",
  "Chọn nghề","Hứng thú nghề","Khẳng định bản thân","Kinh tế","Nhu cầu xã hội",
  "Mức lương","Thời gian đào tạo","Kỳ vọng cha mẹ","Hoạt động nhận thức", 
  "Tri giác có chủ định","Ghi nhớ logic","Tính cách","Ngoại Hình","Sức khỏe","Học phí",
  "Tư duy trừu tượng","Tư duy lý luận","Óc phê phán","Năng lực","Sở trường","Sở thích",
  "Hoài nghi khoa học","Năng lực học tập","Tính độc lập","Tính sáng tạo","Cá nhân hóa",
  "Sở thích cá nhân","Bạn bè","Thầy cô","Xu hướng","Định kiến xã hội","Văn hóa","Môi trường sống"
];

const NOISE_WORDS = [
  "Trà sữa trân châu","Định lý Pi-ta-go","Chơi Game","Ai đồ Tiktok","Giáo viên", "Up Locket",
  "Bún đậu mắm tôm","Hố đen vũ trụ","Đu Trend mạng","Bấm điện thoại","Cúp C1 Châu Âu", "Meow",
  "Ngủ nướng","Lực ma sát","Cách mạng 4.0","Labubu","Diễn viên","Săn sale", "Trà sữa", "Bánh bao",
  "Trí tuệ nhân tạo","Tập Gym","Phim truyền hình","Toán cao cấp","Lướt Facebook", "Bây bi tri",
  "Tóp Tóp","Gà rán KFC","Oxi hóa khử","Đạo hàm tích phân","Cầu lông","Gấu Bông","Xác suất thống kê"
];

const ALL = [...TARGET_WORDS, ...NOISE_WORDS];
const targetSet = new Set(TARGET_WORDS);

let score = 0, miss = 0;
const scoreEl = document.getElementById('score-val');
const missEl  = document.getElementById('miss-val');
const toast   = document.getElementById('toast');
let toastTimer = null;


let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function playHit() {
  try {
    const c = getCtx();
    const g = c.createGain();
    g.connect(c.destination);
    g.gain.setValueAtTime(0.35, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.45);
    const o = c.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(520, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(780, c.currentTime + 0.06);
    o.frequency.exponentialRampToValueAtTime(650, c.currentTime + 0.2);
    o.connect(g); o.start(); o.stop(c.currentTime + 0.45);
  } catch(e) {}
}
function playMiss() {
  try {
    const c = getCtx();
    const g = c.createGain();
    g.connect(c.destination);
    g.gain.setValueAtTime(0.3, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
    const o = c.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(100, c.currentTime + 0.3);
    o.connect(g); o.start(); o.stop(c.currentTime + 0.3);
  } catch(e) {}
}


function showToast(msg, type) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'show ' + type;
  toastTimer = setTimeout(() => { toast.className = ''; }, 900);
}


function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }


const isMobile   = window.innerWidth < 640;
const LANE_COUNT = isMobile ? 7 : 10;
const stage      = document.getElementById('stage');
const stagH      = window.innerHeight;
const laneH      = stagH / LANE_COUNT;

const sizes    = isMobile ? [13,15,17,19,22]     : [15,18,21,25,30,36];
const weights  = [300,400,500,600,700];
const opacities= [0.35,0.55,0.75,0.9,1.0];

const laneData = [];

for (let i = 0; i < LANE_COUNT; i++) {
  const lane = document.createElement('div');
  lane.className = 'lane';
  lane.style.top    = (i * laneH + laneH * 0.12) + 'px';
  lane.style.height = laneH + 'px';

  const words = shuffle(ALL).concat(shuffle(ALL));
  words.forEach(word => {
    const span = document.createElement('span');
    span.className   = 'kw';
    span.textContent = word;
    span.style.fontSize   = rnd(sizes) + 'px';
    span.style.fontWeight = rnd(weights);
    span.style.opacity    = rnd(opacities);

    span.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (this.classList.contains('hit') || this.classList.contains('miss')) return;
      if (targetSet.has(this.textContent)) {
        this.classList.add('hit');
        score++; scoreEl.textContent = score;
        playHit();
        showToast('✓ Chính xác!', 'good');
      } else {
        this.classList.add('miss');
        miss++; missEl.textContent = miss;
        playMiss();
        showToast('✗ Nhầm gòiiiiiiiii', 'bad');
      }
    }, { passive: false });

    lane.appendChild(span);
  });

  stage.appendChild(lane);

  const baseSpd = isMobile ? 55 : 110;
  const varSpd  = isMobile ? 45 : 80;
  const speed   = baseSpd + Math.random() * varSpd;
  const dir     = (i % 2 === 0) ? 1 : -1;
  laneData.push({ el: lane, speed, dir, offset: 0, totalWidth: 0 });
}


requestAnimationFrame(() => {
  laneData.forEach(lane => {
    const w = lane.el.scrollWidth;
    lane.totalWidth = w;
    lane.offset = lane.dir === 1 ? -w / 2 : 0;
    lane.el.style.transform = `translateX(${lane.offset}px)`;
  });
});


let last = null;
function animate(ts) {
  if (!last) last = ts;
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  laneData.forEach(lane => {
    if (!lane.totalWidth) return;
    const half = lane.totalWidth / 2;
    lane.offset -= lane.dir * lane.speed * dt;
    if (lane.dir ===  1 && lane.offset < -half) lane.offset += half;
    if (lane.dir === -1 && lane.offset >  0)    lane.offset -= half;
    lane.el.style.transform = `translateX(${lane.offset}px)`;
  });

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
